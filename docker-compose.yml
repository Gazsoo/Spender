services:
  caddy:
    image: caddy:latest
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      API_DOMAIN: ${API_DOMAIN}
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - api
      - frontend

  api:
    image: ${API_IMAGE} # set in .env, e.g. ghcr.io/yourusername/spender-api:latest
    restart: always
    environment:
      ConnectionStrings__Default: Host=postgres;Database=spender;Username=spender;Password=${DB_PASSWORD}
      ASPNETCORE_ENVIRONMENT: Production
      GoogleAuth__ClientId: ${GOOGLE_CLIENT_ID}
      GoogleAuth__AllowedEmails: ${GOOGLE_ALLOWED_EMAILS}
      Cors__AllowedOrigin: https://${APP_DOMAIN}
      Home__HungaroMetStationId: "44505"
      Home__Lat: "47.4719"
      Home__Lon: "19.0519"
      Home__WeatherPollIntervalMinutes: "10"
      Home__CpuCompensationFactor: "0.5"
    depends_on:
      - postgres

  frontend:
    image: ${FRONTEND_IMAGE} # set in .env, e.g. ghcr.io/yourusername/spender-frontend:latest
    restart: always
    environment:
      API_DOMAIN: ${API_DOMAIN}
      APP_DOMAIN: ${APP_DOMAIN}

  sensor:
    image: ${SENSOR_IMAGE:-spender-sensor}
    build:
      context: ./sensor
    restart: unless-stopped
    privileged: true
    environment:
      API_URL: http://api:5020
      POLL_INTERVAL_SECONDS: "30"
      SENSOR_BACKEND: sensehat
    depends_on:
      - api

  postgres:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_DB: spender
      POSTGRES_USER: spender
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /mnt/ssd/postgres:/var/lib/postgresql

volumes:
  caddy_data: