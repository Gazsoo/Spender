# .github/workflows/deploy.yml
name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to GitHub Container Registry (free)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # automatic, no setup needed ✅

      # Build for ARM64 (Pi architecture)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64 # Pi architecture ✅
          push: true
          tags: ghcr.io/${{ vars.OWNER  }}/spender-api:latest

      - name: Build and push Sensor image
        uses: docker/build-push-action@v5
        with:
          context: ./sensor
          file: ./sensor/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ vars.OWNER  }}/spender-sensor:latest

      # Frontend codegen (Orval) needs the OpenAPI spec written by Spender.API.
      # Generate it here so the frontend image build never needs the .NET SDK.
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Generate OpenAPI spec for frontend codegen
        run: dotnet build Spender.API/Spender.API.csproj -c Release

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/spender-ui/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ vars.OWNER  }}/spender-frontend:latest
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}

      - name: Copy files to Pi
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: ~/spender/

      # SSH into Pi and restart containers
      - name: Deploy to Pi
        uses: appleboy/ssh-action@v1
        with:
          port: ${{ secrets.PORT }} # e.g. 61
          host: ${{ secrets.HOST }} # your cloudflare tunnel or local IP
          username: ${{ secrets.USER }} # pi or your username
          key: ${{ secrets.SSH_KEY }} # private SSH key
          envs: API_DOMAIN,APP_DOMAIN,API_IMAGE,FRONTEND_IMAGE,SENSOR_IMAGE,DB_PASSWORD,GOOGLE_CLIENT_ID,GOOGLE_ALLOWED_EMAILS
          script: |
            cd ~/spender
            docker compose pull
            docker compose up -d
            docker image prune -f   # clean up old images
        env:
          API_DOMAIN: ${{ vars.API_DOMAIN }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          API_IMAGE: ghcr.io/${{ vars.OWNER  }}/spender-api:latest
          FRONTEND_IMAGE: ghcr.io/${{ vars.OWNER  }}/spender-frontend:latest
          SENSOR_IMAGE: ghcr.io/${{ vars.OWNER  }}/spender-sensor:latest
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }} # only this needs to be a secret
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }} # not secret — it ends up in the public frontend bundle anyway
          GOOGLE_ALLOWED_EMAILS: ${{ secrets.GOOGLE_ALLOWED_EMAILS }}
